name: Codex-Ratchet Unified SIM Pipeline && SSDF Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-sast:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-core.txt
        pip install -r requirements-runtime.txt
        pip install -r requirements-dev.txt
    - name: Run Ruff Linter
      run: ruff check .
    - name: Run Mypy
      run: mypy system_v4 || true

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-core.txt
        pip install -r requirements-runtime.txt
        pip install -r requirements-dev.txt
    - name: Run Pytest
      run: pytest -q system_v4/tests/

  sca-and-sbom:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-core.txt
        pip install -r requirements-runtime.txt
        pip install pip-audit
    - name: Create artifacts directory
      run: mkdir -p artifacts
    - name: Run pip-audit
      run: pip-audit -r requirements-runtime.txt -f json -o artifacts/pip-audit.json || true
    - name: Generate SBOM (Syft)
      run: |
        curl -sSfL https://get.anchore.io/syft | sh -s -- -b ./bin
        ./bin/syft dir:. -o cyclonedx-json=artifacts/sbom.cdx.json || true

  sim-execution:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install core dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-core.txt
    - name: Home Path PII Guard Gate
      run: |
        if grep -RIn "/Users/" --include="*.py" --include="*.json" --include="*.md" . ; then
          echo "FAIL: Absolute home paths (PII / Portability leak) detected in repository files."
          exit 1
        fi
    - name: Run SIM Pipeline
      run: |
        python system_v4/probes/run_all_sims.py
    - name: Upload Evidence
      uses: actions/upload-artifact@v4
      with:
        name: unified_evidence_report
        path: system_v4/probes/a2_state/sim_results/unified_evidence_report.json
