<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Ratchet — Attractor Basin & Engine Cycle Visualizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #0a0a1a; 
  color: #e0e0e0; 
  font-family: 'Courier New', monospace;
  overflow: hidden;
}
#container { width: 100vw; height: 100vh; position: relative; }
canvas { display: block; }
#hud {
  position: absolute; top: 16px; left: 16px;
  background: rgba(10, 10, 40, 0.85);
  border: 1px solid rgba(100, 200, 255, 0.3);
  border-radius: 8px; padding: 12px 16px;
  font-size: 12px; line-height: 1.6;
  max-width: 320px;
  backdrop-filter: blur(8px);
}
#hud h2 { 
  color: #6cf; font-size: 13px; 
  border-bottom: 1px solid rgba(100, 200, 255, 0.2);
  padding-bottom: 4px; margin-bottom: 6px;
}
.metric { display: flex; justify-content: space-between; }
.metric .label { color: #8af; }
.metric .value { color: #ff6; font-weight: bold; }
.pass { color: #4f4; }
.kill { color: #f44; }
#controls {
  position: absolute; bottom: 16px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 12px;
}
#controls button {
  background: rgba(100, 200, 255, 0.15);
  border: 1px solid rgba(100, 200, 255, 0.4);
  color: #6cf; padding: 6px 14px;
  border-radius: 4px; cursor: pointer;
  font-family: inherit; font-size: 11px;
}
#controls button:hover { background: rgba(100, 200, 255, 0.3); }
</style>
</head>
<body>
<div id="container">
  <canvas id="gl"></canvas>
  <div id="hud">
    <h2>CODEX RATCHET — ATTRACTOR BASIN</h2>
    <div class="metric"><span class="label">Orbit (Trace Dist):</span><span class="value" id="m-orbit">0.0000</span></div>
    <div class="metric"><span class="label">Berry Phase θ:</span><span class="value" id="m-berry">0.000°</span></div>
    <div class="metric"><span class="label">Negentropy Φ:</span><span class="value" id="m-phi">0.0000</span></div>
    <div class="metric"><span class="label">Purity Tr(ρ²):</span><span class="value" id="m-purity">0.0000</span></div>
    <div class="metric"><span class="label">Cycle:</span><span class="value" id="m-cycle">0</span></div>
    <div class="metric"><span class="label">Engine Status:</span><span class="value pass" id="m-status">RUNNING</span></div>
  </div>
  <div id="controls">
    <button onclick="togglePause()">⏸ Pause</button>
    <button onclick="resetSim()">↻ Reset</button>
    <button onclick="toggleWireframe()">◇ Wireframe</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// WebGL Nested Hopf Torus — Berry Phase Attractor Basin
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

// ── Shader Sources ──
const VS = `
  attribute vec3 aPos;
  attribute vec3 aNormal;
  attribute float aPhase;
  uniform mat4 uProj;
  uniform mat4 uView;
  uniform mat4 uModel;
  uniform float uBerryAngle;
  uniform float uTime;
  varying vec3 vNormal;
  varying vec3 vPos;
  varying float vPhase;
  varying float vHeight;
  
  void main() {
    // Apply Berry phase twist along the torus fiber
    float twist = aPhase * uBerryAngle;
    vec3 twisted = aPos;
    twisted.z += sin(twist + uTime * 0.5) * 0.15;
    
    vec4 worldPos = uModel * vec4(twisted, 1.0);
    gl_Position = uProj * uView * worldPos;
    vNormal = mat3(uModel) * aNormal;
    vPos = worldPos.xyz;
    vPhase = aPhase;
    vHeight = twisted.z;
  }
`;

const FS = `
  precision mediump float;
  varying vec3 vNormal;
  varying vec3 vPos;
  varying float vPhase;
  varying float vHeight;
  uniform float uPhi;
  uniform float uPurity;
  uniform float uTime;
  uniform int uWireframe;
  
  void main() {
    vec3 lightDir = normalize(vec3(0.5, 0.8, 1.0));
    float diff = max(dot(normalize(vNormal), lightDir), 0.15);
    
    // Color by Berry phase traversal
    float phase01 = fract(vPhase / 6.28318);
    vec3 hotColor = vec3(1.0, 0.3, 0.1);   // Deductive (S→0)
    vec3 coolColor = vec3(0.1, 0.4, 1.0);  // Inductive (S↑)
    vec3 baseColor = mix(coolColor, hotColor, phase01);
    
    // Modulate by negentropy (brightness = structural order)
    baseColor *= (0.4 + 0.6 * uPhi);
    
    // Purity glow on high-order regions
    float glow = smoothstep(0.3, 0.8, uPurity) * 0.3;
    baseColor += vec3(glow, glow * 0.5, 0.0);
    
    // Height-based aurora effect
    float aurora = sin(vHeight * 8.0 + uTime * 2.0) * 0.1 + 0.1;
    baseColor += vec3(0.0, aurora * 0.5, aurora);
    
    vec3 finalColor = baseColor * diff;
    
    if (uWireframe == 1) {
      finalColor = baseColor * 0.8;
    }
    
    gl_FragColor = vec4(finalColor, 0.92);
  }
`;

// ── Shader Compilation ──
function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    console.error(gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compileShader(VS, gl.VERTEX_SHADER));
gl.attachShader(prog, compileShader(FS, gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
gl.useProgram(prog);

// ── Torus Geometry ──
function generateHopfTorus(R, r, nMajor, nMinor) {
  const verts = [], norms = [], phases = [], indices = [];
  
  for (let i = 0; i <= nMajor; i++) {
    const theta = (i / nMajor) * Math.PI * 2;
    for (let j = 0; j <= nMinor; j++) {
      const phi = (j / nMinor) * Math.PI * 2;
      
      const x = (R + r * Math.cos(phi)) * Math.cos(theta);
      const y = (R + r * Math.cos(phi)) * Math.sin(theta);
      const z = r * Math.sin(phi);
      
      const nx = Math.cos(phi) * Math.cos(theta);
      const ny = Math.cos(phi) * Math.sin(theta);
      const nz = Math.sin(phi);
      
      verts.push(x, y, z);
      norms.push(nx, ny, nz);
      phases.push(theta + phi * 0.5); // Hopf fiber phase
    }
  }
  
  for (let i = 0; i < nMajor; i++) {
    for (let j = 0; j < nMinor; j++) {
      const a = i * (nMinor + 1) + j;
      const b = a + nMinor + 1;
      indices.push(a, b, a + 1, b, b + 1, a + 1);
    }
  }
  
  return { verts: new Float32Array(verts), norms: new Float32Array(norms),
           phases: new Float32Array(phases), indices: new Uint16Array(indices) };
}

// Outer torus (S² major loop)
const outer = generateHopfTorus(1.5, 0.5, 64, 32);
// Inner torus (S¹ fiber bundle)
const inner = generateHopfTorus(0.8, 0.25, 48, 24);

function uploadMesh(mesh) {
  const vao = {};
  vao.vBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vao.vBuf);
  gl.bufferData(gl.ARRAY_BUFFER, mesh.verts, gl.STATIC_DRAW);
  
  vao.nBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vao.nBuf);
  gl.bufferData(gl.ARRAY_BUFFER, mesh.norms, gl.STATIC_DRAW);
  
  vao.pBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vao.pBuf);
  gl.bufferData(gl.ARRAY_BUFFER, mesh.phases, gl.STATIC_DRAW);
  
  vao.iBuf = gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, vao.iBuf);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, mesh.indices, gl.STATIC_DRAW);
  
  vao.count = mesh.indices.length;
  return vao;
}

const outerVAO = uploadMesh(outer);
const innerVAO = uploadMesh(inner);

// ── Uniforms ──
const uProj = gl.getUniformLocation(prog, 'uProj');
const uView = gl.getUniformLocation(prog, 'uView');
const uModel = gl.getUniformLocation(prog, 'uModel');
const uBerryAngle = gl.getUniformLocation(prog, 'uBerryAngle');
const uTime = gl.getUniformLocation(prog, 'uTime');
const uPhi = gl.getUniformLocation(prog, 'uPhi');
const uPurity = gl.getUniformLocation(prog, 'uPurity');
const uWireframe = gl.getUniformLocation(prog, 'uWireframe');
const aPos = gl.getAttribLocation(prog, 'aPos');
const aNormal = gl.getAttribLocation(prog, 'aNormal');
const aPhase = gl.getAttribLocation(prog, 'aPhase');

// ── Matrix Utils ──
function perspective(fov, aspect, near, far) {
  const f = 1.0 / Math.tan(fov / 2);
  return new Float32Array([
    f/aspect, 0, 0, 0,
    0, f, 0, 0,
    0, 0, (far+near)/(near-far), -1,
    0, 0, 2*far*near/(near-far), 0
  ]);
}

function lookAt(eye, center, up) {
  const z = normalize3(sub3(eye, center));
  const x = normalize3(cross3(up, z));
  const y = cross3(z, x);
  return new Float32Array([
    x[0], y[0], z[0], 0,
    x[1], y[1], z[1], 0,
    x[2], y[2], z[2], 0,
    -dot3(x,eye), -dot3(y,eye), -dot3(z,eye), 1
  ]);
}

function rotateY(angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  return new Float32Array([c,0,s,0, 0,1,0,0, -s,0,c,0, 0,0,0,1]);
}

function rotateX(angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  return new Float32Array([1,0,0,0, 0,c,-s,0, 0,s,c,0, 0,0,0,1]);
}

function mulMat4(a, b) {
  const r = new Float32Array(16);
  for (let i = 0; i < 4; i++)
    for (let j = 0; j < 4; j++)
      for (let k = 0; k < 4; k++)
        r[i*4+j] += a[i*4+k] * b[k*4+j];
  return r;
}

function sub3(a,b) { return [a[0]-b[0],a[1]-b[1],a[2]-b[2]]; }
function cross3(a,b) { return [a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]]; }
function dot3(a,b) { return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }
function normalize3(v) { const l=Math.sqrt(dot3(v,v)); return [v[0]/l,v[1]/l,v[2]/l]; }

// ── Engine Simulation State ──
let simState = {
  cycle: 0,
  phi: 0.3,
  purity: 0.5,
  orbit: 0.5,
  berryAngle: 0,
  paused: false,
  wireframe: false,
};

function stepEngine() {
  if (simState.paused) return;
  simState.cycle++;
  
  // Simulate the dual-loop ratchet dynamics
  const t = simState.cycle * 0.02;
  
  // Berry phase accumulation (720° traversal over full cycle)
  simState.berryAngle += 0.025 + 0.01 * Math.sin(t * 0.3);
  
  // Negentropy oscillation (WIN/LOSE strokes)
  const winStroke = 0.02 * Math.sin(t * 1.5);
  const loseStroke = -0.015 * Math.abs(Math.sin(t * 0.7));
  simState.phi = Math.max(0.01, Math.min(0.95, 
    simState.phi + winStroke + loseStroke + 0.001));
  
  // Purity oscillation
  simState.purity = 0.4 + 0.3 * Math.sin(t * 0.8) + 0.1 * Math.cos(t * 2.1);
  
  // Orbit (trace distance to attractor)
  simState.orbit = 0.3 + 0.2 * Math.sin(t * 0.5) * Math.exp(-t * 0.01);
  
  // Update HUD
  document.getElementById('m-orbit').textContent = simState.orbit.toFixed(4);
  document.getElementById('m-berry').textContent = ((simState.berryAngle * 180 / Math.PI) % 720).toFixed(1) + '°';
  document.getElementById('m-phi').textContent = simState.phi.toFixed(4);
  document.getElementById('m-purity').textContent = simState.purity.toFixed(4);
  document.getElementById('m-cycle').textContent = simState.cycle;
}

function togglePause() { simState.paused = !simState.paused; }
function resetSim() { 
  simState.cycle = 0; simState.phi = 0.3; simState.purity = 0.5;
  simState.orbit = 0.5; simState.berryAngle = 0;
}
function toggleWireframe() { simState.wireframe = !simState.wireframe; }

// ── Render Loop ──
function drawMesh(vao) {
  gl.bindBuffer(gl.ARRAY_BUFFER, vao.vBuf);
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);
  
  gl.bindBuffer(gl.ARRAY_BUFFER, vao.nBuf);
  gl.enableVertexAttribArray(aNormal);
  gl.vertexAttribPointer(aNormal, 3, gl.FLOAT, false, 0, 0);
  
  gl.bindBuffer(gl.ARRAY_BUFFER, vao.pBuf);
  gl.enableVertexAttribArray(aPhase);
  gl.vertexAttribPointer(aPhase, 1, gl.FLOAT, false, 0, 0);
  
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, vao.iBuf);
  
  if (simState.wireframe) {
    for (let i = 0; i < vao.count; i += 3) {
      gl.drawElements(gl.LINE_LOOP, 3, gl.UNSIGNED_SHORT, i * 2);
    }
  } else {
    gl.drawElements(gl.TRIANGLES, vao.count, gl.UNSIGNED_SHORT, 0);
  }
}

let startTime = Date.now();
let mouseX = 0, mouseY = 0;
canvas.addEventListener('mousemove', e => {
  mouseX = (e.clientX / canvas.width - 0.5) * 2;
  mouseY = (e.clientY / canvas.height - 0.5) * 2;
});

function render() {
  const t = (Date.now() - startTime) / 1000;
  stepEngine();
  
  gl.clearColor(0.04, 0.04, 0.1, 1);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  
  const aspect = canvas.width / canvas.height;
  const proj = perspective(Math.PI / 4, aspect, 0.1, 100);
  const view = lookAt([0, 2, 5], [0, 0, 0], [0, 1, 0]);
  
  gl.uniformMatrix4fv(uProj, false, proj);
  gl.uniformMatrix4fv(uView, false, view);
  gl.uniform1f(uTime, t);
  gl.uniform1f(uPhi, simState.phi);
  gl.uniform1f(uPurity, simState.purity);
  gl.uniform1f(uBerryAngle, simState.berryAngle);
  gl.uniform1i(uWireframe, simState.wireframe ? 1 : 0);
  
  // Outer torus — slow rotation + mouse interaction
  const rotY = t * 0.3 + mouseX * 0.5;
  const rotXa = 0.3 + mouseY * 0.3;
  const modelOuter = mulMat4(rotateY(rotY), rotateX(rotXa));
  gl.uniformMatrix4fv(uModel, false, modelOuter);
  drawMesh(outerVAO);
  
  // Inner torus — counter-rotating (Hopf fiber)
  const modelInner = mulMat4(rotateY(-t * 0.5 + mouseX * 0.3), rotateX(-0.2 + mouseY * 0.2));
  gl.uniformMatrix4fv(uModel, false, modelInner);
  drawMesh(innerVAO);
  
  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
