problem_id: GRAVITY_ROSETTA_V1
goal: "Discrete entropic-curvature operator K=LΦ predicts drift direction"
witness:
  kind: correlation_graph_laplacian
  parameters:
    n_nodes: [4, 8, 16]
    d_local: [2, 4, 8]
constraints:
  - CPTP_steps_only
  - PSD_trace_invariants
  - finite_system_only
scoring:
  primary: "drift_alignment >= 0.50"
  secondary: "stability_across_seeds >= 0.80"
negative_tests:
  - "fails_when_random_topology"
  - "fails_when_maximally_mixed_initial"
sim_file: entropic_curvature_lattice_sim.py
result_artifact: entropic_curvature_lattice_results.json
status: SOLVED
---
problem_id: SET_THEORY_ROSETTA_V1
goal: "Sets emerge as stable MI correlation clusters"
witness:
  kind: mutual_information_graph
  parameters:
    n_qubits: [3, 4, 5, 6]
    tau: [0.01, 0.1, 0.5]
constraints:
  - finite_qubit_system
  - partial_trace_reduction
scoring:
  primary: "jaccard_stability_small >= 0.90"
  secondary: "jaccard_dissolution_large <= 0.60"
negative_tests:
  - "fails_when_product_state"
sim_file: set_theory_correlation_cluster_sim.py
result_artifact: set_theory_cluster_results.json
status: SOLVED
