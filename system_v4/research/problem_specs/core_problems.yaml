problem_id: AXIS_LIE_CLOSURE_V1
goal: "6 axis generators produce a >6-dimensional Lie algebra via commutators"
witness:
  kind: choi_commutator_closure
  parameters:
    dims: [4, 8, 16]
    max_levels: 2
constraints:
  - normalized_choi
  - singular_value_rank_threshold
scoring:
  primary: "closure_rank > base_rank"
  secondary: "stable_across_dimensions"
negative_tests:
  - "fails_when_axes_identical"
sim_file: axis_lie_closure_expansion_sim.py
result_artifact: axis_lie_closure_results.json
status: SOLVED
