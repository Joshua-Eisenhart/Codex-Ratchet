problem_id: CALCULUS_EMERGENCE_V1
goal: "Wave/Line algebras become orthogonal at large d (calculus is emergent)"
witness:
  kind: choi_operator_pair
  parameters:
    dims: [4, 8, 16, 32, 64]
constraints:
  - non_triviality_gate
  - CPTP_channels
scoring:
  primary: "overlap_convergence_to_zero"
  secondary: "both_norms_above_1e-6"
negative_tests:
  - "fails_at_d=4"
sim_file: axis5_discrete_calculus_rosetta_sim.py
result_artifact: axis5_discrete_calculus_rosetta_results.json
status: KILL_EXPECTED
