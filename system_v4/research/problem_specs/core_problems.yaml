problem_id: RESIDUAL_SUBSPACE_V1
goal: "Operator manifold has stable directions beyond axes 1-6"
witness:
  kind: projection_residual
  parameters:
    dims: [4, 8, 16]
    n_probes: 30
constraints:
  - random_CPTP_probes
  - least_squares_projection
scoring:
  primary: "mean_residual_norm >= 0.20"
  secondary: "stability_across_seeds >= 0.80"
negative_tests:
  - "fails_when_probes_in_axis_span"
sim_file: axis_residual_subspace_discovery_sim.py
result_artifact: axis_residual_subspace_results.json
status: SOLVED
