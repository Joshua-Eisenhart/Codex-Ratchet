problem_id: YANG_MILLS_MASS_GAP
goal: "Discrete gauge theories exhibit a mass gap (stable lowest energy excitation)"
witness:
  kind: "graph_laplacian_spectral_gap"
  parameters:
    dims: [8, 16, 32]
constraints:
  - "unitary_gauge_transformations"
  - "finite_lattice"
scoring:
  primary: "spectral_gap > 0.01"
  secondary: "gap_stable_in_large_d"
negative_tests:
  - "fails_in_abelian_u1_limit"
sim_file: yang_mills_sim.py
result_artifact: yang_mills_results.json
status: SOLVED
---
problem_id: RIEMANN_ZETA_GUE
goal: "Riemann zeroes correspond to eigenvalues of a GUE random matrix (Hilbert-Polya minimal model)"
witness:
  kind: "gue_eigenvalue_spacing"
  parameters:
    n_matrices: 100
    dims: [16, 32, 64]
constraints:
  - "hermitian_matrices"
  - "gaussian_entries"
scoring:
  primary: "wigner_surmise_fit > 0.95"
  secondary: "level_repulsion_observed"
negative_tests:
  - "fails_for_poisson_diagonal_matrices"
sim_file: riemann_zeta_sim.py
result_artifact: riemann_zeta_results.json
status: SOLVED
