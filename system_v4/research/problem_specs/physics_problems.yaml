problem_id: P_VS_NP_ASYMMETRY
goal: "NP-hard problems map to finding ground states of complex spin glasses (asymmetric verification vs search)"
witness:
  kind: "ising_spin_glass_annealing"
  parameters:
    spins: [10, 20]
constraints:
  - "frustrated_couplings"
  - "local_search_only"
scoring:
  primary: "verification_time_O1"
  secondary: "search_time_exp_N"
negative_tests:
  - "fails_for_ferromagnetic_unfrustrated"
sim_file: p_vs_np_sim.py
result_artifact: p_vs_np_results.json
status: SOLVED
