problem_id: TOPOLOGICAL_MATTER
goal: "Stable bulk properties emerge from edge states under continuous deformation"
witness:
  kind: "density_matrix_dynamics"
  parameters:
    dims: [4, 8]
constraints:
  - "CPTP_steps_only"
  - "PSD_trace_invariants"
scoring:
  primary: "purity_preserved_for_DM"
  secondary: "entropy_diverges_for_DE"
negative_tests:
  - "fails_when_no_dissipation"
sim_file: origin_chain_physics_sim.py
result_artifact: origin_chain_physics_results.json
status: SOLVED
