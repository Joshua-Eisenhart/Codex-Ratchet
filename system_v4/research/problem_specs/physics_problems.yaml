problem_id: BIG_BANG_TIME_GENESIS
goal: "Time emerges dynamically from sequential entanglement/decoherence rather than static block universe"
witness:
  kind: "sequential_fuzz_origin"
  parameters:
    dims: [4, 8, 16]
constraints:
  - "no_static_time_parameter"
  - "CPTP_channels"
scoring:
  primary: "time_arrow_emerges"
  secondary: "entropy_monotonically_increases"
negative_tests:
  - "fails_in_unitary_only_systems"
sim_file: big_bang_fuzz_sim.py
result_artifact: big_bang_fuzz_results.json
status: SOLVED
