problem_id: BIG_BANG_TIME_GENESIS
goal: "Time begins when bipartite entanglement I(A:B)>0 breaks thermal symmetry"
witness:
  kind: entanglement_symmetry_break
  parameters:
    d: [2, 4, 8, 16]
constraints:
  - CPTP_steps_only
  - finite_system_only
  - thermal_initial_state
scoring:
  primary: "mutual_info_positive >= 0.80"
  secondary: "symmetry_break_detected >= 0.90"
negative_tests:
  - "fails_when_no_interaction"
  - "fails_when_maximally_mixed_initial"
sim_file: big_bang_fuzz_sim.py
result_artifact: big_bang_fuzz_results.json
status: ACTIVE
