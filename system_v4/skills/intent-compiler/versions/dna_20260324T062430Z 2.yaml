# Codex Ratchet Engine DNA
# Version: v1.0
# The seed configuration that defines the engine's identity.
# This file is the single source of truth for:
#   - What constraints must hold (the manifold)
#   - What probes run (the evidence suite)
#   - What operators are available (the skill dispatch)
#   - What the engine's current state is

schema: codex_ratchet_dna_v1
version: "1.0"
created: "2026-03-23T12:54:00Z"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# AXIOMS (F01, N01) — the non-negotiable foundation
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
axioms:
  F01_finitude: "All systems have finite capacity d < ∞"
  N01_noncommutation: "Operations do not commute: AB ≠ BA"
  CAS04_operational_equivalence: "No primitive identity a=a; equivalence is operational"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CONSTRAINTS — what must hold (Z3/SAT verifiable)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
constraints:
  phase_period_positive: "phase_period > 0"
  phase_index_nonneg: "phase_index >= 0"
  phase_index_bounded: "phase_index < phase_period"
  region_nonempty: "region is non-empty"
  no_blocked_admissible_conflict: "BLOCKED and ADMISSIBLE cannot coexist"
  no_degenerate_stable_conflict: "DEGENERATE and STABLE cannot coexist"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# OPERATORS — the 4 kernel operators
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
operators:
  Ti:
    name: "Projective/Constraint"
    cptp: "ρ → Σ P_k ρ P_k (projection)"
    role: "Measurement, dephasing, rank reduction"
    sign_minus: "Sink/Absorb (quantize)"
    sign_plus: "Source/Emit (regularize)"
  Te:
    name: "Gradient/Variational"
    cptp: "ρ → U(θ)ρU†(θ) (Hamiltonian flow)"
    role: "Directed motion, optimization"
    sign_minus: "Gradient descent (minimize loss)"
    sign_plus: "Gradient ascent (maximize)"
  Fi:
    name: "Memory/Spectral"
    cptp: "ρ → F ρ F† / Tr(F ρ F†) (filtering)"
    role: "Selective retention, spectral matching"
    sign_minus: "Matched filtering (absorption)"
    sign_plus: "Spectral synthesis (emission)"
  Fe:
    name: "Dissipative/Coupling"
    cptp: "Lindblad: L ρ L† - ½{L†L, ρ}"
    role: "Entropy export, environmental coupling"
    sign_minus: "Diffusive damping (smoothing)"
    sign_plus: "Entrainment drive (phase-lock)"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ENGINE TYPES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
engines:
  type_1:
    description: "Engine A outer (deductive/cooling), Engine B inner (inductive/heating)"
    major_loop: "FeTi"
    minor_loop: "TeFi"
    stages: 8
    substages_per_stage: 4
    total_microstates: 32
  type_2:
    description: "Engine B outer (inductive/heating), Engine A inner (deductive/cooling)"
    major_loop: "TeFi"
    minor_loop: "FeTi"
    stages: 8
    substages_per_stage: 4
    total_microstates: 32

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PROBE SUITE — what SIMs to run
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
probes:
  - abiogenesis_sim.py
  - alignment_sim.py
  - arithmetic_gravity_sim.py
  - chemistry_sim.py
  - complexity_gap_sim.py
  - consciousness_sim.py
  - constraint_gap_sim.py
  - deep_math_foundations_sim.py
  - demon_fixed_sim.py
  - dual_weyl_spinor_engine_sim.py
  - engine_terrain_sim.py
  - foundations_sim.py
  - full_8stage_engine_sim.py
  - gain_calibration_sim.py
  - godel_stall_sim.py
  - igt_advanced_sim.py
  - igt_game_theory_sim.py
  - math_foundations_sim.py
  - navier_stokes_complexity_sim.py
  - navier_stokes_formal_sim.py
  - navier_stokes_qit_sim.py
  - nlm_batch2_sim.py
  - p_vs_np_sim.py
  - proof_cost_sim.py
  - quantum_gravity_sim.py
  - riemann_zeta_sim.py
  - rock_falsifier_enhanced_sim.py
  - rock_falsifier_sim.py
  - scale_testing_sim.py
  - scientific_method_sim.py
  - szilard_64stage_sim.py
  - topology_operator_sim.py
  - type2_engine_sim.py
  - world_model_sim.py
  - yang_mills_sim.py
  # Negative SIMs (expected-KILL boundary probes)
  - neg_commutative_engine_sim.py
  - neg_single_loop_sim.py
  - neg_infinite_d_sim.py
  - neg_classical_probability_sim.py
  - neg_no_dissipation_sim.py

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# HEARTBEAT — self-reflection config
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
heartbeat:
  interval_seconds: 1800
  triage_every_n_ticks: 6
  self_kill_conditions:
    - "3 consecutive runs with increasing KILL count"
    - "any AXIOM-layer token goes KILL"
    - "total PASS count drops below 50"
  reflection_checks:
    - "compare PASS/KILL counts to previous run"
    - "flag any new KILLs"
    - "flag any recovered PASSes"
    - "compute ΔΦ trend across runs"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# GRAVEYARD — KILL tracking
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
graveyard:
  current_kills:
    - token: "S_SIM_BASIN_DEPTH_V1"
      sim: "complexity_gap_sim.py"
      reason: "NO_CORRELATION — P-NP gap doesn't scale with d"
    - token: "S_SIM_DUAL_SZILARD_V1"
      sim: "szilard_64stage_sim.py"
      reason: "ADDITIVE — 64-stage entropy not additive across dual engines"
    - token: "S_SIM_GAIN_CALIBRATION_V1"
      sim: "gain_calibration_sim.py"
      reason: "NO_POSITIVE_DPHI_IN_SWEEP — all ΔΦ ≈ -0.41"
    - token: "S_SIM_CALIBRATED_ENGINE_V1"
      sim: "gain_calibration_sim.py"
      reason: "BEST_DPHI=-0.411196_STILL_NEGATIVE"
    - token: "S_SIM_ABIOGENESIS_V1"
      sim: "abiogenesis_sim.py"
      reason: "NO_SPONTANEOUS_LIFE — random operators never produce structure"

  # Known open KILLs — heartbeat uses this to distinguish expected failures
  # from new regressions. A new KILL not in this list triggers DEGRADED status.
  known_open_kills:
    - "S_SIM_BASIN_DEPTH_V1"
    - "S_SIM_DUAL_SZILARD_V1"
    - "S_SIM_GAIN_CALIBRATION_V1"
    - "S_SIM_CALIBRATED_ENGINE_V1"
    - "S_SIM_ABIOGENESIS_V1"
    # Negative SIMs — these SHOULD be KILL (boundary probes)
    - "S_NEG_COMMUTATIVE_ENGINE_V1"
    - "S_NEG_SINGLE_LOOP_V1"
    - "S_NEG_INFINITE_D_V1"
    - "S_NEG_CLASSICAL_PROBABILITY_V1"
    - "S_NEG_NO_DISSIPATION_V1"

  resolved_kills:
    - token: "S_SIM_DEMON_V1"
      fixed_by: "demon_fixed_sim.py — basis-matched measurement"
    - token: "S_SIM_WORLD_MODEL_V1"
      fixed_by: "Random init + adaptive step + FEP blend"
    - token: "S_SIM_STRUCTURE_V1"
      fixed_by: "Random init (I/d → make_random_density_matrix)"

