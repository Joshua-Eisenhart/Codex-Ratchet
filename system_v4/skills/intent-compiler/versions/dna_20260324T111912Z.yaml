# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# HEARTBEAT — self-reflection config
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
heartbeat:
  interval_seconds: 1800
  triage_every_n_ticks: 6
  self_kill_conditions:
    - "3 consecutive runs with increasing KILL count"
    - "any AXIOM-layer token goes KILL"
    - "total PASS count drops below 50"
  reflection_checks:
    - "compare PASS/KILL counts to previous run"
    - "flag any new KILLs"
    - "flag any recovered PASSes"
    - "compute ΔΦ trend across runs"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# GRAVEYARD — KILL tracking
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
graveyard:
  current_kills: []

  # Known open KILLs — heartbeat uses this to distinguish expected failures
  # from new regressions. A new KILL not in this list triggers DEGRADED status.
  known_open_kills: []

  resolved_kills:
    - token: "E_SIM_GAP_SCALES_V2_OK"
      fixed_by: "complexity_gap_v2_sim.py — formally implemented O(d log d) evaluation"
    - token: "E_SIM_DUAL_SZILARD_OK"
      fixed_by: "szilard_64stage_v2_sim.py — Berry phase alignment"
    - token: "E_SIM_GAIN_CALIBRATION_V2_OK"
      fixed_by: "gain_calibration_v2_sim.py — min 2w bounds"
    - token: "E_SIM_LANDAUER_BOUND_OK"
      fixed_by: "gain_calibration_v2_sim.py — critical damping applied"
    - token: "E_SIM_DIRECTIONAL_ACCUMULATOR_ABIOGENESIS_OK"
      fixed_by: "abiogenesis_v2_sim.py — dual loop structural accumulator proved"
    - token: "E_SIM_DEMON_FIX_VALIDATED_OK"
      fixed_by: "demon_fixed_sim.py — basis-matched measurement"
    - token: "E_SIM_WORLD_MODEL_STRUCTURE_OK"
      fixed_by: "Random init + adaptive step + FEP blend"
    - token: "E_SIM_FRACTAL_NESTING_V1_OK"
      fixed_by: "Random init (I/d → make_random_density_matrix)"

