# Codex Ratchet Engine DNA
# Version: v1.0
# The seed configuration that defines the engine's identity.
# This file is the single source of truth for:
#   - What constraints must hold (the manifold)
#   - What probes run (the evidence suite)
#   - What operators are available (the skill dispatch)
#   - What the engine's current state is

schema: codex_ratchet_dna_v1
version: "1.1"
created: "2026-03-23T12:54:00Z"
updated: "2026-03-26T08:40:00Z"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# AXIOMS (F01, N01) — the non-negotiable foundation
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
axioms:
  F01_finitude: "All systems have finite capacity d < ∞"
  N01_noncommutation: "Operations do not commute: AB ≠ BA"
  CAS04_operational_equivalence: "No primitive identity a=a; equivalence is operational"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CONSTRAINTS — what must hold (Z3/SAT verifiable)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
constraints:
  phase_period_positive: "phase_period > 0"
  phase_index_nonneg: "phase_index >= 0"
  phase_index_bounded: "phase_index < phase_period"
  region_nonempty: "region is non-empty"
  no_blocked_admissible_conflict: "BLOCKED and ADMISSIBLE cannot coexist"
  no_degenerate_stable_conflict: "DEGENERATE and STABLE cannot coexist"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# OPERATORS — the 4 kernel operators
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
operators:
  Ti:
    name: "Projective/Constraint"
    cptp: "ρ → Σ P_k ρ P_k (projection)"
    role: "Measurement, dephasing, rank reduction"
    sign_minus: "Sink/Absorb (quantize)"
    sign_plus: "Source/Emit (regularize)"
  Te:
    name: "Gradient/Variational"
    cptp: "ρ → U(θ)ρU†(θ) (Hamiltonian flow)"
    role: "Directed motion, optimization"
    sign_minus: "Gradient descent (minimize loss)"
    sign_plus: "Gradient ascent (maximize)"
  Fi:
    name: "Memory/Spectral"
    cptp: "ρ → F ρ F† / Tr(F ρ F†) (filtering)"
    role: "Selective retention, spectral matching"
    sign_minus: "Matched filtering (absorption)"
    sign_plus: "Spectral synthesis (emission)"
  Fe:
    name: "Dissipative/Coupling"
    cptp: "Lindblad: L ρ L† - ½{L†L, ρ}"
    role: "Entropy export, environmental coupling"
    sign_minus: "Diffusive damping (smoothing)"
    sign_plus: "Entrainment drive (phase-lock)"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ENGINE TYPES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
engines:
  type_1:
    description: "Engine A outer (deductive/cooling), Engine B inner (inductive/heating)"
    major_loop: "FeTi"
    minor_loop: "TeFi"
    stages: 8
    substages_per_stage: 4
    total_microstates: 32
  type_2:
    description: "Engine B outer (inductive/heating), Engine A inner (deductive/cooling)"
    major_loop: "TeFi"
    minor_loop: "FeTi"
    stages: 8
    substages_per_stage: 4
    total_microstates: 32

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ENGINE CORE — full geometric engine (exploratory)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
engine_core:
  status: "exploratory"  # Not promoted to default counted truth
  validation_sim: "sim_full_engine.py"
  stages_per_type: 32
  total_stages: 64
  controls_per_stage:
    piston: "Operator amplitude [0, 1]"
    lever: "Polarity direction (up/down)"
    torus: "Nested torus latitude η (inner/Clifford/outer)"
    spinor: "Which spinor(s) to apply to (left/right/both)"
    axis0: "Coarse-graining / entropy ceiling [0, 1]"
  terrains:
    count: 8
    schema: "loop × expansion × openness"
    loops: ["fiber", "base"]
    expansion: [true, false]
    openness: [true, false]
    names: ["Se_f", "Si_f", "Ne_f", "Ni_f", "Se_b", "Si_b", "Ne_b", "Ni_b"]
  axis0:
    mechanism: "Hopf-fiber coarse-graining (real fiber samples)"
    causal: true
    ga0_level_range: [0.0, 1.0]
    modulates: ["operator strength", "fiber sampling density"]
  topology:
    manifold: "S³ (3-sphere)"
    bundle: "Hopf fibration S³ → S²"
    nested_tori: ["inner (π/8)", "Clifford (π/4)", "outer (3π/8)"]
    transport: "S³ interpolation (stable, not geodesic)"
    spinors: "Left (ψ_L) and Right (ψ_R = iσ₂·ψ_L*) Weyl"
    conjugate_dynamics: "R gets σ_x basis flip for Ti/Fe/Fi, reversed rotation for Te"

