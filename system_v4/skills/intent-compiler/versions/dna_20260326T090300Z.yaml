# HEARTBEAT — self-reflection config
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
heartbeat:
  interval_seconds: 1800
  triage_every_n_ticks: 6
  self_kill_conditions:
    - "3 consecutive runs with increasing KILL count"
    - "any AXIOM-layer token goes KILL"
    - "total PASS count drops below 50"
  reflection_checks:
    - "compare PASS/KILL counts to previous run"
    - "flag any new KILLs"
    - "flag any recovered PASSes"
    - "compute ΔΦ trend across runs"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# GRAVEYARD — KILL tracking
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
graveyard:
  current_kills:
    - token: "S_SIM_EGGLOG_DEFORMATION_V1"
      sim: "egglog_graph_rewrite_probe.py"
      reason: "DEFORMATION_INCOMPLETE"
    - token: "E_MOLOCH_CLASSICAL_SURVIVED"
      sim: "sim_moloch_trap_field.py"
      reason: "CLASSICAL_AGENTS_SURVIVED_UNEXPECTEDLY"
    - token: "S_SIM_ABIOGENESIS_V1"
      sim: "abiogenesis_sim.py"
      reason: "NO_SPONTANEOUS_LIFE"
    - token: "S_SIM_GAIN_CALIBRATION_V1"
      sim: "gain_calibration_sim.py"
      reason: "NO_POSITIVE_DPHI_IN_SWEEP"
    - token: "S_SIM_CALIBRATED_PROCESS_CYCLE_V1"
      sim: "gain_calibration_sim.py"
      reason: "BEST_DPHI=-0.449596_STILL_NEGATIVE"

  # Known open KILLs — heartbeat uses this to distinguish expected failures
  # from new regressions. A new KILL not in this list triggers DEGRADED status.
  known_open_kills:
    # Standalone negative SIMs — these should KILL when the modeled engine is legitimate.
    - "S_NEG_COMMUTATIVE_PROCESS_CYCLE_V1"
    - "S_NEG_INFINITE_D_V1"
    - "S_NEG_SINGLE_LOOP_V1"
    - "neg_classical_probability_sim.py:CLASSICAL_PROBABILITY_INSUFFICIENT"
    - "S_NEG_NO_DISSIPATION_V2"
    - "S_NEG_SCRAMBLED_SEQUENCE_V1"
    - "S_NEG_INVERTED_MAJOR_LOOP_V1"

    # Deep and extended graveyard batteries — intentional basin-boundary witnesses.
    - "S_NEG_C3"
    - "S_NEG_X2"
    - "S_NEG_Ti"
    - "S_NEG_Te"
    - "S_NEG_Fi"
    - "S_NEG_C4"
    - "S_CMP_F01_N01"
    - "S_CMP_C6_C8"
    - "S_CMP_3"
    - "S_CMP_4"
    - "S_CMP_5"
    - "S_NEG_SCRAMBLE"
    - "S_NEG_SYMMETRIC"
    - "S_NEG_DECOHERE"

    # Thermodynamic graveyard battery — intentional collapse surfaces.
    - "S_NEG_CLONE"
    - "S_NEG_ZERO_H"
    - "S_NEG_INF_GAMMA"
    - "S_NEG_PURE_LOCK"
    - "S_NEG_DIM1"
    - "S_NEG_NO_BATH"
    - "S_NEG_REVERSED"
    - "S_NEG_DEPOLAR"

    # Information graveyard battery — intentional anti-ratchet witnesses.
    - "S_NEG_CLASSICAL"
    - "S_NEG_NO_FEEDBACK"
    - "S_NEG_DETERMINISTIC"
    - "S_NEG_MAX_MIXED"
    - "S_NEG_IDENTICAL_OP"
    - "S_NEG_PROJ_ONLY"
    - "S_NEG_FROZEN_BASIS"
    - "S_NEG_ANTI_RATCHET"

    # Geometry graveyard — geometry-removal witnesses.
    - "S_NEG_NO_TORUS_TRANSPORT"
    - "S_NEG_AXIS0_FROZEN"
    - "S_NEG_NO_CHIRALITY"
    - "S_NEG_TORUS_SCRAMBLED"

  resolved_kills:
    - token: "E_SIM_GAP_SCALES_V2_OK"
      fixed_by: "complexity_gap_v2_sim.py — formally implemented O(d log d) evaluation"
    - token: "E_SIM_DUAL_SZILARD_OK"
      fixed_by: "szilard_64stage_v2_sim.py — Berry phase alignment"
    - token: "E_SIM_GAIN_CALIBRATION_V2_OK"
      fixed_by: "gain_calibration_v2_sim.py — min 2w bounds"
    - token: "E_SIM_LANDAUER_BOUND_OK"
      fixed_by: "gain_calibration_v2_sim.py — critical damping applied"
    - token: "E_SIM_DIRECTIONAL_ACCUMULATOR_ABIOGENESIS_OK"
      fixed_by: "abiogenesis_v2_sim.py — dual loop structural accumulator proved"
    - token: "E_SIM_DEMON_FIX_VALIDATED_OK"
      fixed_by: "demon_fixed_sim.py — basis-matched measurement"
    - token: "E_SIM_WORLD_MODEL_STRUCTURE_OK"
      fixed_by: "Random init + adaptive step + FEP blend"
    - token: "E_SIM_FRACTAL_NESTING_V1_OK"
