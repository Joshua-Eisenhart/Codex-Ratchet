<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Ratchet | Global Evidence Telemetry</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-base: #09090b;
            --bg-card: rgba(24, 24, 27, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent-cyan: #22d3ee;
            --accent-pass: #10b981;
            --accent-kill: #ef4444;
            --font-ui: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-ui);
            line-height: 1.6;
            padding: 2rem;
            min-height: 100vh;
            background-image: radial-gradient(circle at 15% 50%, rgba(34, 211, 238, 0.05), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(239, 68, 68, 0.05), transparent 25%);
        }

        /* Top Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .title-group h1 {
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
        }
        
        .title-group h1 span {
            color: var(--accent-cyan);
            font-family: var(--font-mono);
            font-weight: 400;
        }

        .title-group p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .metrics-bar {
            display: flex;
            gap: 1.5rem;
        }

        .metric {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-align: right;
            backdrop-filter: blur(12px);
            transition: transform 0.2s ease;
        }

        .metric:hover {
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.2);
        }

        .m-value {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .m-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        .pass-text { color: var(--accent-pass); text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
        .kill-text { color: var(--accent-kill); text-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }

        /* Dashboard Grid */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr;
            grid-template-rows: auto auto;
            gap: 1.5rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 24px -1px rgba(0,0,0,0.5);
        }

        .card-title {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
        }

        .card-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-cyan);
            border-radius: 50%;
            margin-right: 0.75rem;
            box-shadow: 0 0 8px var(--accent-cyan);
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .chart-container.tall {
            height: 500px;
        }

        /* Token Table */
        .table-container {
            overflow-y: auto;
            max-height: 500px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .table-container::-webkit-scrollbar { width: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            text-align: left;
            padding: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: #18181b;
            z-index: 10;
        }

        td {
            padding: 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-family: var(--font-mono);
        }

        tr:hover td {
            background: rgba(255,255,255,0.02);
        }

        .badge-pass { background: rgba(16, 185, 129, 0.1); color: var(--accent-pass); padding: 0.2rem 0.6rem; border-radius: 4px; border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-kill { background: rgba(239, 68, 68, 0.1); color: var(--accent-kill); padding: 0.2rem 0.6rem; border-radius: 4px; border: 1px solid rgba(239, 68, 68, 0.2); }

        .file-col { color: var(--accent-cyan); opacity: 0.8; }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--accent-cyan);
            font-family: var(--font-mono);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    </style>
</head>
<body>

    <header>
        <div class="title-group">
            <h1>Evidence <span>// Telemetry Matrix</span></h1>
            <p id="timestamp">Syncing data stream...</p>
        </div>
        <div class="metrics-bar">
            <div class="metric">
                <div class="m-value" id="val-total">--</div>
                <div class="m-label">Total Boundaries</div>
            </div>
            <div class="metric" style="border-bottom: 2px solid var(--accent-pass)">
                <div class="m-value pass-text" id="val-pass">--</div>
                <div class="m-label">Verified (PASS)</div>
            </div>
            <div class="metric" style="border-bottom: 2px solid var(--accent-kill)">
                <div class="m-value kill-text" id="val-kill">--</div>
                <div class="m-label">Violations (KILL)</div>
            </div>
        </div>
    </header>

    <div class="dashboard">
        <!-- Layer Distribution -->
        <div class="card">
            <h2 class="card-title">Token Output by Architecture Layer</h2>
            <div class="chart-container">
                <canvas id="layerChart"></canvas>
            </div>
        </div>

        <!-- SIM Breakdown Heatmap -->
        <div class="card">
            <h2 class="card-title">SIM File Pass/Kill Distribution</h2>
            <div class="chart-container">
                <canvas id="simChart"></canvas>
            </div>
        </div>

        <!-- Open KILLs Tracker -->
        <div class="card" style="grid-column: 1 / -1;">
            <h2 class="card-title">Recent Boundary Failures (KILL Tokens)</h2>
            <div class="table-container">
                <table id="killTable">
                    <thead>
                        <tr>
                            <th>Status</th>
                            <th>Token ID</th>
                            <th>Source File</th>
                            <th>Measured Value</th>
                            <th>Kill Reason</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Set Chart.js Defaults for Dark Mode
        Chart.defaults.color = '#a1a1aa';
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.scale.grid.color = 'rgba(255, 255, 255, 0.05)';
        Chart.defaults.plugins.tooltip.backgroundColor = 'rgba(24, 24, 27, 0.9)';
        Chart.defaults.plugins.tooltip.titleFont = { family: "'JetBrains Mono', monospace", size: 13 };
        Chart.defaults.plugins.tooltip.padding = 12;

        async function fetchTelemetry() {
            try {
                // Read from the actual local JSON path
                const response = await fetch('../probes/a2_state/sim_results/unified_evidence_report.json');
                const data = await response.json();
                renderDashboard(data);
            } catch (err) {
                console.error("Failed to load telemetry data:", err);
                document.getElementById('timestamp').innerText = "ERROR: Failed to load unified_evidence_report.json";
                document.getElementById('timestamp').style.color = "var(--accent-kill)";
            }
        }

        function renderDashboard(data) {
            // 1. Update Top Metrics
            document.getElementById('timestamp').innerText = 'Last Updated: ' + new Date(data.timestamp).toLocaleString();
            document.getElementById('val-total').innerText = data.total_tokens;
            document.getElementById('val-pass').innerText = data.pass_count;
            document.getElementById('val-kill').innerText = data.kill_count;

            // Extract flat token list
            const allTokens = [];
            const layerCounts = { pass: [], kill: [], labels: [] };
            
            // Build layer stats
            const layers = Object.keys(data.layers).sort((a,b) => Number(a) - Number(b));
            for (let l of layers) {
                layerCounts.labels.push(`L${l}`);
                let p = 0, k = 0;
                data.layers[l].forEach(t => {
                    allTokens.push(t);
                    if (t.status === 'PASS') p++;
                    if (t.status === 'KILL') k++;
                });
                layerCounts.pass.push(p);
                layerCounts.kill.push(k);
            }

            // Build SIM file stats
            const simMap = {};
            allTokens.forEach(t => {
                const s = t.source_file;
                if (!simMap[s]) simMap[s] = { pass: 0, kill: 0 };
                if (t.status === 'PASS') simMap[s].pass++;
                if (t.status === 'KILL') simMap[s].kill++;
            });

            const simLabels = Object.keys(simMap).sort();
            const simPass = simLabels.map(s => simMap[s].pass);
            const simKill = simLabels.map(s => simMap[s].kill);

            // 2. Render Layer Stacked Bar Chart
            new Chart(document.getElementById('layerChart'), {
                type: 'bar',
                data: {
                    labels: layerCounts.labels,
                    datasets: [
                        {
                            label: 'KILL',
                            data: layerCounts.kill,
                            backgroundColor: '#ef4444',
                            borderRadius: 4
                        },
                        {
                            label: 'PASS',
                            data: layerCounts.pass,
                            backgroundColor: '#10b981',
                            borderRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { stacked: true },
                        y: { stacked: true, beginAtZero: true }
                    },
                    plugins: {
                        legend: { position: 'top', align: 'end' }
                    }
                }
            });

            // 3. Render SIM Breakdown Chart
            new Chart(document.getElementById('simChart'), {
                type: 'bar',
                data: {
                    labels: simLabels,
                    datasets: [
                        {
                            label: 'KILL',
                            data: simKill,
                            backgroundColor: '#ef4444',
                            borderRadius: 2
                        },
                        {
                            label: 'PASS',
                            data: simPass,
                            backgroundColor: 'rgba(34, 211, 238, 0.6)',
                            borderRadius: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    scales: {
                        x: { stacked: true, beginAtZero: true },
                        y: { stacked: true, ticks: { font: { family: "'JetBrains Mono', monospace", size: 10 } } }
                    },
                    plugins: {
                        legend: { position: 'top', align: 'end' }
                    }
                }
            });

            // 4. Populate KILL Table
            const tbody = document.querySelector('#killTable tbody');
            const kills = allTokens.filter(t => t.status === 'KILL');
            
            if (kills.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color: var(--accent-pass); padding: 2rem;">All boundaries formally preserved. Zero active KILLs.</td></tr>`;
            } else {
                kills.forEach(k => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><span class="badge-kill">KILL</span></td>
                        <td style="color: var(--text-main);">${k.token_id || k.sim_spec_id}</td>
                        <td class="file-col">${k.source_file}</td>
                        <td>${parseFloat(k.measured_value).toFixed(6)}</td>
                        <td style="max-width:300px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${k.kill_reason}">${k.kill_reason}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', fetchTelemetry);

    </script>
</body>
</html>
