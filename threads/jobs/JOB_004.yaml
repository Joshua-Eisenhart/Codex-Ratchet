task: CROSS_VALIDATE
title: "Cross-validate v3 system understanding vs v4 system spec"
scope:
  - system_v4/a2_state/v3_system_understanding_v1.json
  - system_v4/specs/01_V4_SYSTEM_SPEC.md
  - system_v4/specs/03_V4_SKILL_CLUSTER_SPEC.md
  - system_v4/a2_state/v3_v4_governance_map_v1.json

output_format: |
  Compare what the system BELIEVES about v3 (v3_system_understanding)
  vs what v4 REQUIRES (V4_SYSTEM_SPEC + SKILL_CLUSTER_SPEC).
  
  For each area:
  - alignment: ALIGNED | PARTIAL | CONTRADICTED | MISSING
  - evidence: specific citations
  - action: what needs to change
  
  Focus on: layer mapping, authority model, skill contracts,
  state file contracts, graph structure expectations.

output_path: threads/results/JOB_004/
